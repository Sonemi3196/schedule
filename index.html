<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--s1:#111318;--s2:#181c24;--s3:#1f2433;--s4:#262d40;--b1:#2a3148;--b2:#364060;--text:#e2e8f8;--t2:#8892b0;--t3:#4a5578;--t4:#2e3650;--a:#38bdf8;--ag:#0ea5e9;--g:#4ade80;--y:#fbbf24;--o:#fb923c;--r:#f87171;--p:#a78bfa;--mono:'DM Mono',monospace;--jp:'Zen Kaku Gothic New',sans-serif}
[data-theme="light"]{--bg:#f0f4f8;--s1:#ffffff;--s2:#f8fafc;--s3:#eef2f7;--s4:#e2e8f0;--b1:#cbd5e1;--b2:#94a3b8;--text:#1e293b;--t2:#475569;--t3:#94a3b8;--t4:#cbd5e1;--a:#0284c7;--ag:#0369a1;--g:#16a34a;--y:#d97706;--o:#ea580c;--r:#dc2626;--p:#7c3aed}
[data-theme="warm"]{--bg:#1a1612;--s1:#211d18;--s2:#2a2420;--s3:#332d27;--s4:#3d362f;--b1:#4a4038;--b2:#5c5048;--text:#f0e8de;--t2:#b8a898;--t3:#7a6a5c;--t4:#4a3e34;--a:#f59e0b;--ag:#d97706;--g:#4ade80;--y:#fbbf24;--o:#fb923c;--r:#f87171;--p:#c084fc}
[data-theme="blue"]{--bg:#0d1117;--s1:#161b22;--s2:#1c2128;--s3:#21262d;--s4:#2d333b;--b1:#30363d;--b2:#484f58;--text:#e6edf3;--t2:#8b949e;--t3:#484f58;--t4:#21262d;--a:#58a6ff;--ag:#388bfd;--g:#3fb950;--y:#d29922;--o:#db6d28;--r:#f85149;--p:#bc8cff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--jp);font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
button{cursor:pointer;font-family:var(--jp)}input,select,textarea{font-family:var(--jp)}.hidden{display:none!important}
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{overflow-y:auto;min-height:100vh}.view{padding:20px 24px;max-width:940px}
.sb-logo{padding:20px 16px 14px;font-family:var(--mono);font-size:15px;color:var(--a);letter-spacing:.5px}
.sb-sec{padding:5px 10px 2px;font-size:9px;font-family:var(--mono);color:var(--t4);letter-spacing:1.5px;text-transform:uppercase}
.nb{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:8px;margin:1px 6px;border:none;background:none;color:var(--t2);font-size:13px;text-align:left;transition:all .15s;width:calc(100% - 12px)}
.nb:hover{background:var(--s3);color:var(--text)}.nb.active{background:var(--s3);color:var(--a)}.nb-ic{font-size:15px;width:20px;text-align:center}
.sb-projs{padding:2px 6px}
.sb-proj{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:7px;margin:1px 0;cursor:pointer;font-size:12px;color:var(--t2);transition:all .15s;border:none;background:none;width:100%;text-align:left}
.sb-proj:hover{background:var(--s3);color:var(--text)}.sb-proj.active{background:var(--s4);color:var(--text)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-new{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;margin:2px 6px;border:1px dashed var(--b2);background:none;color:var(--t3);font-size:12px;width:calc(100% - 12px);transition:all .15s}
.sb-new:hover{border-color:var(--a);color:var(--a)}
.save-status{margin:4px 8px 8px;padding:7px 10px;border-radius:7px;font-size:11px;font-family:var(--mono);display:flex;align-items:center;gap:5px;border:1px solid transparent;transition:all .4s}
.save-status.idle{color:var(--t3)}.save-status.saving{color:var(--y);background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2)}
.save-status.saved{color:var(--g);background:rgba(74,222,128,.07);border-color:rgba(74,222,128,.2)}
.save-status.error{color:var(--r);background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.2)}
.save-status.notoken{color:var(--o);background:rgba(251,146,60,.07);border-color:rgba(251,146,60,.2)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:none;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--a);color:#0a0c10}.btn-primary:hover{background:var(--ag)}
.btn-sec{background:var(--s3);color:var(--text);border:1px solid var(--b1)}.btn-sec:hover{background:var(--s4)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--b1)}.btn-ghost:hover{background:var(--s3);color:var(--text)}
.btn-warn{background:rgba(251,146,60,.15);color:var(--o);border:1px solid rgba(251,146,60,.3)}.btn-warn:hover{background:rgba(251,146,60,.25)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--r);border:1px solid rgba(248,113,113,.25)}.btn-danger:hover{background:rgba(248,113,113,.22)}
.btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:2px 7px;font-size:11px}.btn-icon{padding:5px 8px}
.card{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px 16px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.ph-title{font-size:18px;font-weight:700}.ph-actions{display:flex;gap:8px;flex-wrap:wrap}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--s1);border:1px solid var(--b1);border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
.modal-lg{max-width:660px}.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
.mtitle{font-size:15px;font-weight:700}.mbody{padding:14px 20px}
.mfoot{padding:12px 20px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--b1)}
.fg{margin-bottom:11px}.fl{display:block;font-size:11px;color:var(--t2);margin-bottom:4px;font-family:var(--mono)}
.fi{width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--a)}.fs{width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;outline:none}
.ft{width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;resize:vertical;min-height:58px}
.frow{display:flex;gap:10px}.frow .fg{flex:1}.fhint{font-size:11px;color:var(--t3);margin-top:3px}
.pbar{background:var(--s4);border-radius:99px;overflow:hidden;height:5px}.pbar-fill{height:100%;border-radius:99px;transition:width .3s}.pbar-lg{height:8px}
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10.5px;font-family:var(--mono);font-weight:500}
.chip-todo{background:rgba(74,85,120,.3);color:var(--t2)}.chip-doing{background:rgba(56,189,248,.15);color:var(--a)}
.chip-review{background:rgba(167,139,250,.15);color:var(--p)}.chip-done{background:rgba(74,222,128,.15);color:var(--g)}.chip-hold{background:rgba(251,191,36,.1);color:var(--y)}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.pcard{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.pcard:hover{border-color:var(--b2);background:var(--s3)}.pcard-accent{height:3px;border-radius:99px;margin-bottom:12px}
.tlist{display:flex;flex-direction:column;gap:4px}
.titem{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:8px;background:var(--s2);border:1px solid var(--b1)}.titem.done-item{opacity:.45}
.tcheck{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--b2);background:none;color:transparent;font-size:11px;flex-shrink:0;margin-top:1px;transition:all .15s}
.tcheck.chk{background:var(--g);border-color:var(--g);color:#0a0c10}.tbody{flex:1;min-width:0}
.tname{font-size:13px;font-weight:500;margin-bottom:3px}.tmeta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tmeta-i{font-size:11px;color:var(--t3);font-family:var(--mono)}.tactions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.titem:hover .tactions{opacity:1}
.sched-grid{display:flex;flex-direction:column;gap:5px}
.sched-day{background:var(--s2);border:1px solid var(--b1);border-radius:10px;overflow:hidden}.sched-day.today-row{border-color:rgba(56,189,248,.5)}
.sday-head{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;user-select:none;transition:background .15s}.sday-head:hover{background:var(--s3)}
.sday-date{font-size:12px;font-family:var(--mono);min-width:130px}.today-label{color:var(--a)}.sday-bar{flex:1}
.sday-info{font-size:11px;color:var(--t3);font-family:var(--mono);min-width:72px;text-align:right}
.sday-toggle{font-size:10px;color:var(--t3);transition:transform .2s;margin-left:4px}.sched-day.open .sday-toggle{transform:rotate(90deg)}
.sday-tasks{display:none;padding:2px 10px 10px;flex-direction:column;gap:3px}.sched-day.open .sday-tasks{display:flex}
.stask{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--s3);border-radius:7px;font-size:12.5px}
.stask.done-t{opacity:.4}.stask.late-t{border-left:2px solid var(--r)}.stask.conflict-t{border-left:2px solid var(--o);background:rgba(251,146,60,.06)}
.stask-check{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--b2);background:none;color:transparent;font-size:10px;flex-shrink:0;transition:all .15s}
.stask-check.chk{background:var(--g);border-color:var(--g);color:#0a0c10}
.stask-time{font-size:10.5px;color:var(--a);font-family:var(--mono);min-width:100px;flex-shrink:0}
.stask-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stask-mins{font-size:10.5px;color:var(--t3);font-family:var(--mono);margin-left:auto}.stask-acts{display:flex;gap:3px;flex-shrink:0}
.cal-wrap{background:var(--s2);border:1px solid var(--b1);border-radius:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(44px,1fr));min-width:308px}
.cal-dow{text-align:center;font-size:10px;font-family:var(--mono);color:var(--t3);padding:8px 0;border-bottom:1px solid var(--b1)}
.cal-cell{border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);min-height:90px;padding:6px;cursor:pointer;transition:background .15s;position:relative}
.cal-cell:nth-child(7n){border-right:none}.cal-cell:hover{background:var(--s3)}.cal-cell.today{background:rgba(56,189,248,.04)}.cal-cell.other-month{opacity:.3}
.cal-cell.selected{background:rgba(167,139,250,.08);outline:2px solid var(--p) inset}
.cal-date{font-size:11.5px;font-family:var(--mono);margin-bottom:3px;display:flex;align-items:center;gap:3px}
.cal-today-dot{width:5px;height:5px;background:var(--a);border-radius:50%}
.cal-pill{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-conflict-badge{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--o);border-radius:50%}
.day-panel{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-top:12px}
.dp-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.tl-hour-line{position:absolute;left:0;right:0;border-top:1px solid var(--b1);pointer-events:none}
.tl-hour-label{position:absolute;right:calc(100% + 6px);font-size:9.5px;font-family:var(--mono);color:var(--t3);white-space:nowrap;transform:translateY(-50%)}
.tl-block{position:absolute;left:4px;right:4px;border-radius:6px;padding:4px 7px;font-size:11px;cursor:pointer;overflow:hidden;border-left:3px solid transparent;transition:opacity .15s}
.tl-block:hover{opacity:.8}.tl-block.conflict-b{outline:1.5px solid var(--o)}
.tl-block-time{font-size:9.5px;opacity:.8;font-family:var(--mono)}.tl-block-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-now{position:absolute;left:0;right:0;height:2px;background:var(--r);pointer-events:none;z-index:2}
.tl-now::before{content:'';position:absolute;left:-5px;top:-4px;width:10px;height:10px;background:var(--r);border-radius:50%}
.tl-plan{opacity:0.75;border-style:dashed}
.tl-actual{border-left-width:4px!important;box-shadow:0 1px 6px rgba(0,0,0,.3)}
.tl-legend{display:flex;gap:12px;margin-bottom:8px;font-size:11px;font-family:var(--mono);color:var(--t2);padding:5px 8px;background:var(--s3);border-radius:6px;flex-wrap:wrap}
.tl-legend-item{display:flex;align-items:center;gap:5px}
.tl-legend-dot{width:12px;height:12px;border-radius:3px}
.conflict-banner{background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--o)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--b1);margin-bottom:14px}
.tab{padding:7px 14px;font-size:12.5px;border:none;background:none;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:var(--a);border-bottom-color:var(--a)}
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px 14px}
.stat-val{font-size:22px;font-family:var(--mono);font-weight:500;margin-bottom:2px}.stat-label{font-size:11px;color:var(--t3)}
.cpicker{display:flex;gap:7px;flex-wrap:wrap}
.cp-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}.cp-dot.selected{border-color:#fff;transform:scale(1.15)}
.settings-block{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:16px;margin-bottom:14px}
.settings-block-title{font-size:11px;font-family:var(--mono);color:var(--a);margin-bottom:12px;letter-spacing:.5px}
.empty{text-align:center;padding:44px 20px;color:var(--t3)}.empty-icon{font-size:36px;margin-bottom:10px}
.mob-bar{display:none}
@media(max-width:768px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-240px;top:0;height:100vh;z-index:200;width:240px;transition:left .25s}
  .sidebar.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.6)}
  .mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}.mob-ov.show{display:block}
  .mob-bar{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--s1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:100}
  .mob-btn{width:33px;height:33px;border:none;background:var(--s3);color:var(--text);border-radius:7px;font-size:17px;display:flex;align-items:center;justify-content:center}
  .mob-title{font-family:var(--mono);font-size:14px;color:var(--a)}
  .view{padding:12px 14px}.stats-strip{grid-template-columns:repeat(2,1fr)}.proj-grid{grid-template-columns:1fr}
  .frow{flex-direction:column}.tactions{opacity:1!important}.stask-acts{opacity:1!important}.sday-bar{display:none}
}
</style>
</head>
<body>
<div class="mob-ov" id="mob-ov" onclick="closeSidebar()"></div>
<div class="shell">
<nav class="sidebar" id="sidebar">
  <div class="sb-logo">&#x2B21; TaskFlow</div>
  <div class="sb-sec">&#x30E1;&#x30A4;&#x30F3;</div>
  <button class="nb" id="nb-dash" onclick="gotoView('dash')"><span class="nb-ic">&#x25C8;</span>&#x30C0;&#x30C3;&#x30B7;&#x30E5;&#x30DC;&#x30FC;&#x30C9;</button>
  <button class="nb" id="nb-schedule" onclick="gotoView('schedule')"><span class="nb-ic">&#x1F4CB;</span>&#x30B9;&#x30B1;&#x30B8;&#x30E5;&#x30FC;&#x30EB;</button>
  <button class="nb" id="nb-calendar" onclick="gotoView('calendar')"><span class="nb-ic">&#x1F4C5;</span>&#x30AB;&#x30EC;&#x30F3;&#x30C0;&#x30FC;</button>
  <button class="nb" id="nb-today" onclick="gotoView('today')"><span class="nb-ic">&#x2600;</span>&#x4ECA;&#x65E5;</button>
  <div class="sb-sec" style="margin-top:8px">&#x30D7;&#x30ED;&#x30B8;&#x30A7;&#x30AF;&#x30C8;</div>
  <div class="sb-projs" id="sb-projs"></div>
  <button class="sb-new" onclick="openProjModal()"><span>&#xFF0B;</span>&#x65B0;&#x898F;&#x30D7;&#x30ED;&#x30B8;&#x30A7;&#x30AF;&#x30C8;</button>
  <div style="flex:1"></div>
  <div class="save-status idle" id="save-status">&#x1F4BE; <span id="ss-text">&#x672A;&#x8AAD;&#x307F;&#x8FBC;&#x307F;</span></div>
  <div class="sb-sec">&#x30B7;&#x30B9;&#x30C6;&#x30E0;</div>
  <button class="nb" id="nb-settings" onclick="gotoView('settings')"><span class="nb-ic">&#x2699;</span>&#x8A2D;&#x5B9A;</button>
  <div style="height:12px"></div>
</nav>
<main class="main">
<div class="mob-bar">
  <button class="mob-btn" onclick="toggleSidebar()">&#x2630;</button>
  <span class="mob-title">TaskFlow</span>
</div>
<div class="view hidden" id="v-dash"></div>
<div class="view hidden" id="v-schedule"></div>
<div class="view hidden" id="v-calendar"></div>
<div class="view hidden" id="v-today"></div>
<div class="view hidden" id="v-settings"></div>
<div class="view hidden" id="v-project">
  <div class="ph"><button class="btn btn-ghost btn-sm" onclick="gotoView('dash')">&larr; &#x623B;&#x308B;</button><div class="ph-actions" id="proj-acts"></div></div>
  <div id="proj-header"></div>
  <div class="tabs">
    <button class="tab active" id="ptab-tasks" onclick="switchPTab('tasks')">&#x30BF;&#x30B9;&#x30AF;</button>
    <button class="tab" id="ptab-sched" onclick="switchPTab('sched')">&#x30B9;&#x30B1;&#x30B8;&#x30E5;&#x30FC;&#x30EB;</button>
    <button class="tab" id="ptab-log" onclick="switchPTab('log')">&#x30ED;&#x30B0;</button>
  </div>
  <div id="pt-tasks"></div><div id="pt-sched" class="hidden"></div><div id="pt-log" class="hidden"></div>
</div>
</main>
</div>
<!-- MODALS -->
<div class="modal-ov hidden" id="m-proj"><div class="modal"><div class="mhead"><span class="mtitle" id="m-proj-title">プロジェクト追加</span><button class="btn btn-ghost btn-xs btn-icon" onclick="closeM('m-proj')">✕</button></div><div class="mbody"><input type="hidden" id="pf-id"><div class="fg"><label class="fl">プロジェクト名 *</label><input class="fi" id="pf-name"></div><div class="frow"><div class="fg"><label class="fl">開始日</label><input class="fi" type="date" id="pf-start"></div><div class="fg"><label class="fl">納期</label><input class="fi" type="date" id="pf-deadline"></div></div><div class="frow"><div class="fg"><label class="fl">1日の上限（分）</label><input class="fi" type="text" inputmode="numeric" id="pf-daily" placeholder="例: 120"></div><div class="fg"><label class="fl">土日を含む</label><select class="fs" id="pf-wkend"><option value="0">含まない</option><option value="1">含む</option></select></div></div><div class="fg"><label class="fl">説明</label><textarea class="ft" id="pf-desc" style="min-height:46px"></textarea></div><div class="fg"><label class="fl">カラー</label><div class="cpicker" id="pf-colors"></div></div><div class="fg"><label class="fl">ステータス</label><select class="fs" id="pf-status"><option value="active">進行中</option><option value="done">完了</option><option value="hold">保留</option></select></div></div><div class="mfoot"><button class="btn btn-sec" onclick="closeM('m-proj')">キャンセル</button><button class="btn btn-primary" onclick="saveProj()">保存</button></div></div></div>

<script>
const COLORS=['#38bdf8','#4ade80','#fb923c','#f87171','#a78bfa','#fbbf24','#34d399','#e879f9'];
const SL={todo:'未着手',doing:'進行中',review:'確認待ち',done:'完了',hold:'保留'};
const JP=['日','月','火','水','木','金','土'];
let D={projects:[],todayTasks:[],actualRecords:[],settings:{maxMins:240,buffer:20,workStart:'09:00',workEnd:'18:00',workdays:[1,2,3,4,5]}};
let curView='dash',curProj=null,curPTab='tasks';
let calY,calM,calSelDate=null,pendingRS=null,pendingConflict=null,resultCtx=null,pickedColor=COLORS[0];

// ══ GITHUB API ══
const GH_OWNER='sonemi3196';
const GH_REPO='schedule';
const GH_FILE='data.json';
const GH_API=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;
function ghToken(){return localStorage.getItem('tf_gh_token')||'';}
function ghSetToken(t){t?localStorage.setItem('tf_gh_token',t):localStorage.removeItem('tf_gh_token');}
function setSS(state,text){const e=document.getElementById('save-status'),t=document.getElementById('ss-text');if(!e)return;e.className='save-status '+state;if(t)t.textContent=text;}

async function ghLoad(){
  const token=ghToken();
  if(!token){setSS('notoken','⚙設定でトークンを入力');return false;}
  setSS('saving','読み込み中…');
  try{
    const res=await fetch(GH_API,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}});
    if(res.status===404){setSS('saved','新規データ（未保存）');return true;}
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    const content=decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
    D=JSON.parse(content);
    window._ghSha=json.sha;
    setSS('saved','✓ 読み込み完了');
    return true;
  }catch(e){setSS('error','読込失敗: '+e.message);return false;}
}

let _saveTimer=null;
async function ghSave(){
  const token=ghToken();
  if(!token){setSS('notoken','⚙設定でトークンを入力');return;}
  setSS('saving','保存中…');
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(D,null,2))));
    const body={message:'TaskFlow update '+new Date().toISOString().slice(0,16),content};
    if(window._ghSha)body.sha=window._ghSha;
    const res=await fetch(GH_API,{method:'PUT',headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok){const err=await res.json();throw new Error(err.message||'HTTP '+res.status);}
    const json=await res.json();
    window._ghSha=json.content.sha;
    setSS('saved','✓ 保存済み');
    setTimeout(()=>setSS('idle','✓ 保存済み'),3000);
  }catch(e){setSS('error','保存失敗: '+e.message);}
}

function save(){invalidateConflictCache();if(_saveTimer)clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>ghSave(),800);}

// ══ UTILS ══
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function td(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtD(s){if(!s)return'';const d=new Date(s+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtDL(s){if(!s)return'';const d=new Date(s+'T00:00:00');return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}(${JP[d.getDay()]})`;}
function dLeft(s){if(!s)return null;const d=new Date(s+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000);}
function getProj(id){return D.projects.find(p=>p.id===id);}
function pcColor(p){return p<30?'var(--r)':p<60?'var(--y)':'var(--g)';}
function chip(s){const m={todo:'chip-todo',doing:'chip-doing',review:'chip-review',done:'chip-done',hold:'chip-hold'};return `<span class="chip ${m[s]||'chip-todo'}">${SL[s]||s}</span>`;}
function t2m(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function m2t(m){const h=Math.floor(m/60),mm=m%60;return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function addMinsT(t,mins){return m2t(t2m(t)+mins);}

// ══ SCHEDULER ══
function getDailyMax(proj){if(proj?.dailyMins&&parseInt(proj.dailyMins)>0)return parseInt(proj.dailyMins);const max=D.settings.maxMins||240;const buf=(D.settings.buffer??20)/100;return Math.max(30,Math.floor(max*(1-buf)));}
function getWS(){return D.settings.workStart||'09:00';}
function isWorkday(ds,proj){const day=new Date(ds+'T00:00:00').getDay();const _wd=proj?.includeWeekends?[0,1,2,3,4,5,6]:(D.settings.workdays||[1,2,3,4,5]);return _wd.includes(day);}

function buildSchedule(proj,fromDate){
  var maxPerDay=getDailyMax(proj),wStartM=t2m(getWS()),today=fromDate||td();
  proj.tasks=(proj.tasks||[]).filter(function(t){if(!t.parentId)return true;if(t.status==='done'||t.status==='hold')return true;if(t.pinned)return true;return false;});
  var parents=(proj.tasks||[]).filter(function(t){return !t.parentId&&t.autoSchedule===true&&t.status!=='done'&&t.status!=='hold';});
  function makeWD(fromStr,toStr){var list=[],cur=new Date(fromStr+'T00:00:00'),end=new Date(toStr+'T00:00:00'),lim=new Date(end.getTime()+200*86400000);while(cur<=lim&&list.length<500){var day=cur.getDay(),wd=proj.includeWeekends?[0,1,2,3,4,5,6]:(D.settings.workdays||[1,2,3,4,5]);if(wd.indexOf(day)>=0){var ds=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');list.push(ds);}cur.setDate(cur.getDate()+1);}return list;}
  for(var pi=0;pi<parents.length;pi++){
    var par=parents[pi],totalEst=par.estimatedMins||maxPerDay;
    var doneSubs=(proj.tasks||[]).filter(function(s){return s.parentId===par.id&&(s.status==='done'||s.pinned);});
    var doneActual=doneSubs.reduce(function(a,s){return a+(s.actualMins||s.estimatedMins||0);},0);
    var done=Math.max(par.actualMins||0,doneActual),remaining=Math.max(0,totalEst-done);
    if(remaining===0){par.scheduledDate=null;continue;}
    var taskFrom=par.taskStartDate||today,prefStartM=par.prefTime?t2m(par.prefTime):wStartM;
    var deadline=proj.deadline||addDays(today,90),workdays=makeWD(taskFrom,deadline);
    var usedDates=new Set(doneSubs.map(function(s){return s.scheduledDate;}));
    var availDays=workdays.filter(function(d){return !usedDates.has(d);});
    if(remaining<=maxPerDay){var d=availDays[0]||taskFrom;par.scheduledDate=d;par.scheduledStartTime=m2t(prefStartM);par.scheduledEndTime=m2t(prefStartM+remaining);}
    else{par.scheduledDate=null;var rem=remaining,subIdx=doneSubs.length+1;for(var wi=0;wi<availDays.length&&rem>0;wi++){var assign=Math.min(rem,maxPerDay);proj.tasks.push({id:uid(),parentId:par.id,name:par.name+' ('+subIdx+')',estimatedMins:assign,scheduledDate:availDays[wi],scheduledStartTime:m2t(prefStartM),scheduledEndTime:m2t(prefStartM+assign),status:'todo',actualMins:0,achievementPct:null,createdAt:td()});rem-=assign;subIdx++;}}
  }
}

// ══ CONFLICT ══
function checkAllConflicts(){const blocks={};D.projects.forEach(proj=>{(proj.tasks||[]).forEach(t=>{if(!t.scheduledDate||!t.scheduledStartTime||t.status==='done')return;const d=t.scheduledDate;if(!blocks[d])blocks[d]=[];blocks[d].push({s:t2m(t.scheduledStartTime),e:t2m(t.scheduledEndTime||addMinsT(t.scheduledStartTime,t.estimatedMins||30)),task:t,proj});});});const res=[];Object.entries(blocks).forEach(([date,list])=>{for(let i=0;i<list.length;i++)for(let j=i+1;j<list.length;j++){const a=list[i],b=list[j];if(a.s<b.e&&b.s<a.e){if(a.task.parentId&&a.task.parentId===b.task.parentId)continue;res.push({date,a,b});}}});return res;}
function calcProg(proj){const tasks=(proj.tasks||[]).filter(t=>!t.parentId&&t.status!=='hold');if(!tasks.length)return 0;const te=tasks.reduce((a,t)=>a+(t.estimatedMins||0),0);if(!te)return Math.round(tasks.filter(t=>t.status==='done').length/tasks.length*100);const ta=tasks.reduce((a,t)=>t.status==='done'?a+(t.actualMins||t.estimatedMins||0):a+(t.actualMins||0),0);return Math.min(100,Math.round(ta/te*100));}
let _conflictCache=null;
function invalidateConflictCache(){_conflictCache=null;}
function getConflictIds(){if(!_conflictCache){const c=checkAllConflicts();const s=new Set();c.forEach(x=>{s.add(x.a.task.id);s.add(x.b.task.id);});_conflictCache={ids:s,count:c.length,raw:c};}return _conflictCache;}

// ══ NAV ══
const VIEWS=['dash','schedule','calendar','today','settings','project'];
function gotoView(v,pid){closeSidebar();VIEWS.forEach(x=>document.getElementById(`v-${x}`).classList.add('hidden'));['dash','schedule','calendar','today','settings'].forEach(x=>document.getElementById(`nb-${x}`)?.classList.remove('active'));document.getElementById(`v-${v}`).classList.remove('hidden');if(['dash','schedule','calendar','today','settings'].includes(v))document.getElementById(`nb-${v}`).classList.add('active');curView=v;if(v==='project'&&pid){curProj=pid;renderProjDetail();}if(v==='dash')renderDash();if(v==='schedule')renderSchedule();if(v==='calendar')renderCalendar();if(v==='today')renderToday();if(v==='settings')renderSettings();renderSidebar();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('mob-ov').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mob-ov').classList.remove('show');}
function openM(id){document.getElementById(id).classList.remove('hidden');}
function closeM(id){document.getElementById(id).classList.add('hidden');}
function switchPTab(t){curPTab=t;['tasks','sched','log'].forEach(x=>{document.getElementById(`pt-${x}`).classList.toggle('hidden',x!==t);document.getElementById(`ptab-${x}`).classList.toggle('active',x===t);});if(t==='tasks')renderProjTasks();if(t==='sched')renderProjSched();if(t==='log')renderProjLog();}
function renderCurrent(tab){renderSidebar();if(curView==='dash')renderDash();if(curView==='schedule')renderSchedule();if(curView==='calendar')renderCalendar();if(curView==='today')renderToday();if(curView==='project'){renderProjDetail();if(tab)switchPTab(tab);}if(curView==='settings')renderSettings();}
function renderAll(){renderCurrent();}
function renderSidebar(){document.getElementById('sb-projs').innerHTML=D.projects.map(p=>`<button class="sb-proj ${curProj===p.id&&curView==='project'?'active':''}" onclick="gotoView('project','${p.id}')"><span class="sb-dot" style="background:${p.color||COLORS[0]}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span></button>`).join('');}

// ══ DASHBOARD ══
function renderDash(){
  const today=td();const todayItems=[];
  D.projects.forEach(proj=>(proj.tasks||[]).forEach(t=>{if(t.scheduledDate===today)todayItems.push({t,proj});}));
  const _sp={id:'personal',name:'個人',color:'#a78bfa',tasks:[]};
  (D.todayTasks||[]).filter(t=>t.date===today).forEach(t=>{
    todayItems.push({t:{...t,scheduledDate:today,scheduledStartTime:t.startTime,scheduledEndTime:t.endTime,parentId:null},proj:_sp,isPersonal:true});
  });
  todayItems.sort((a,b)=>(t2m(a.t.scheduledStartTime)||0)-(t2m(b.t.scheduledStartTime)||0));
  const {ids:conIds,count:conCount,raw:conflicts}=getConflictIds();
  const el=document.getElementById('v-dash');
  const totalMins=todayItems.reduce((a,x)=>a+(x.t.estimatedMins||0),0);
  el.innerHTML=`<div class="ph"><div class="ph-title">ダッシュボード</div></div>
    <div class="stats-strip"><div class="stat-card"><div class="stat-val">${D.projects.filter(p=>p.status!=='done').length}</div><div class="stat-label">進行中プロジェクト</div></div><div class="stat-card"><div class="stat-val">${todayItems.length}</div><div class="stat-label">今日のタスク</div></div><div class="stat-card"><div class="stat-val">${totalMins}</div><div class="stat-label">今日の予定（分）</div></div><div class="stat-card" style="${conflicts.length?'border-color:var(--o)':''}"><div class="stat-val" style="${conflicts.length?'color:var(--o)':''}">${conCount}</div><div class="stat-label">時刻競合</div></div></div>
    ${conCount?`<div class="conflict-banner">⚠ ${conCount}件の時刻競合があります。<button class="btn btn-warn btn-xs" style="margin-left:8px" onclick="showAllConflicts()">確認・修正</button></div>`:''}
    <div style="margin-bottom:14px"><div style="font-size:13px;font-weight:600;margin-bottom:8px">📋 今日の予定</div>${todayItems.length?`<div class="sched-grid">${todayItems.map(({t,proj})=>staskHTML(t,proj,today,conIds)).join('')}</div>`:'<div class="empty" style="padding:20px"><p>今日の予定はありません</p></div>'}</div>
    <div><div style="font-size:13px;font-weight:600;margin-bottom:8px">プロジェクト</div><div class="proj-grid">${D.projects.filter(p=>p.status!=='done'&&p.status!=='hold').map(p=>{const pct=calcProg(p);const dl=dLeft(p.deadline);const dlc=dl===null?'var(--t3)':dl<0?'var(--r)':dl<=7?'var(--o)':'var(--g)';return `<div class="pcard" onclick="gotoView('project','${p.id}')"><div class="pcard-accent" style="background:${p.color||COLORS[0]}"></div><div style="font-size:14px;font-weight:600;margin-bottom:4px">${p.name}</div><div style="font-size:11px;color:var(--t3);display:flex;gap:10px;margin-bottom:9px">${p.deadline?`<span style="color:${dlc}">📅 ${p.deadline}</span>`:''}<span>${pct}%</span></div><div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${pcColor(pct)}"></div></div></div>`;}).join('')}<div class="pcard" style="border-style:dashed;display:flex;align-items:center;justify-content:center;color:var(--t3);min-height:80px" onclick="openProjModal()">＋ 新規プロジェクト</div></div>
    ${D.projects.filter(p=>p.status==='done'||p.status==='hold').length?`
    <div style="margin-top:12px">
      <button onclick="this.nextElementSibling.classList.toggle('hidden')" style="background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 0">
        ▶ 完了・保留プロジェクト（${D.projects.filter(p=>p.status==='done'||p.status==='hold').length}件）
      </button>
      <div class="proj-grid hidden" style="margin-top:8px">${D.projects.filter(p=>p.status==='done'||p.status==='hold').map(p=>{const pct=calcProg(p);const isDone=p.status==='done';return `<div class="pcard" style="opacity:0.6" onclick="gotoView('project','${p.id}')"><div class="pcard-accent" style="background:${p.color||COLORS[0]}"></div><div style="font-size:14px;font-weight:600;margin-bottom:4px">${p.name} <span style="font-size:10px;color:${isDone?'var(--g)':'var(--y)'}">${isDone?'✓完了':'保留'}</span></div><div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${pcColor(pct)}"></div></div></div>`;}).join('')}</div>
    </div>`:''}
    </div>`;
}

// ══ SCHEDULE ══
function renderSchedule(){
  const el=document.getElementById('v-schedule');const byDate={};
  D.projects.forEach(proj=>(proj.tasks||[]).forEach(t=>{if(!t.scheduledDate)return;if(!byDate[t.scheduledDate])byDate[t.scheduledDate]=[];byDate[t.scheduledDate].push({t,proj});}));
  const _sp={id:'personal',name:'個人',color:'#a78bfa',tasks:[]};
  (D.todayTasks||[]).forEach(t=>{if(!t.date)return;if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push({t:{...t,scheduledDate:t.date,scheduledStartTime:t.startTime,scheduledEndTime:t.endTime,parentId:null},proj:_sp});});
  const dates=Object.keys(byDate).sort();const today=td();
  const {ids:conIds,count:conCount,raw:conflicts}=getConflictIds();const conflictDates=new Set(conflicts.map(c=>c.date));
  const pastDates=dates.filter(d=>d<today);
  const futureDates=dates.filter(d=>d>=today);
  function dayHTML(date){
    const items=byDate[date].sort((a,b)=>(t2m(a.t.scheduledStartTime)||0)-(t2m(b.t.scheduledStartTime)||0));
    const tot=items.reduce((a,x)=>a+(x.t.estimatedMins||0),0);
    const isToday=date===today;
    const allDone=items.every(x=>x.t.status==='done'||x.t.status==='hold');
    const hasLate=items.some(x=>x.t.status!=='done'&&x.t.status!=='hold'&&date<today);
    const hasCon=conflictDates.has(date);
    const openClass=(isToday||(!allDone&&date>=today))?'open':'';
    const barColor=allDone?'var(--g)':hasLate?'var(--r)':hasCon?'var(--o)':'var(--a)';
    const infoColor=allDone?'color:var(--g)':hasLate?'color:var(--r)':hasCon?'color:var(--o)':'';
    const infoText=allDone?'✓完了':tot+'分';
    const dateStyle=allDone&&date<today?'opacity:0.5':'';
    let h='';
    h+='<div class="sched-day '+(isToday?'today-row ':'')+openClass+'" id="sd-'+date+'">';
    h+='<div class="sday-head" onclick="toggleSD(\'sd-'+date+'\')">';
    h+='<span class="sday-date '+(isToday?'today-label ':'')+'" style="'+dateStyle+'">'+fmtDL(date)+'</span>';
    h+='<div class="sday-bar"><div class="pbar"><div class="pbar-fill" style="width:'+Math.min(100,Math.round(tot/(getDailyMax(null)||192)*100))+'%;background:'+barColor+'"></div></div></div>';
    h+='<span class="sday-info" style="'+infoColor+'">'+infoText+'</span>';
    h+='<span class="sday-toggle">▶</span></div>';
    h+='<div class="sday-tasks">'+items.map(({t,proj})=>staskHTML(t,proj,date,conIds)).join('')+'</div>';
    h+='</div>';
    return h;
  }
  const pastCount=pastDates.length;
  const pastDoneCount=pastDates.filter(d=>byDate[d].every(x=>x.t.status==='done'||x.t.status==='hold')).length;
  let out='<div class="ph"><div class="ph-title">スケジュール</div><div class="ph-actions">';
  out+=(conCount?'<button class="btn btn-warn btn-sm" onclick="showAllConflicts()">⚠ 競合 '+conCount+'件</button>':'');
  out+='<button class="btn btn-ghost btn-sm" onclick="reschedAll()">⟳ 全体リスケジュール</button></div></div>';
  if(!dates.length){
    out+='<div class="empty"><div class="empty-icon">📋</div><p>スケジュールされたタスクがありません</p></div>';
  } else {
    if(pastCount){
      out+='<div style="margin-bottom:6px">';
      out+='<button onclick="const g=document.getElementById(\'past-sched-group\');g.classList.toggle(\'hidden\');this.querySelector(\'.ptoggle\').textContent=g.classList.contains(\'hidden\')?\'▶\':\'▼\'" ';
      out+='style="background:var(--s3);border:1px solid var(--b1);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--t3);width:100%;text-align:left;display:flex;align-items:center;gap:6px">';
      out+='<span class="ptoggle">▶</span> 過去のスケジュール（'+pastCount+'日）';
      out+='<span style="margin-left:auto;font-size:11px;color:var(--g)">'+pastDoneCount+'/'+pastCount+'日完了</span></button>';
      out+='<div id="past-sched-group" class="hidden" style="margin-top:4px"><div class="sched-grid">';
      pastDates.forEach(d=>{out+=dayHTML(d);});
      out+='</div></div></div>';
    }
    out+='<div class="sched-grid" id="future-sched">';
    futureDates.forEach(d=>{out+=dayHTML(d);});
    out+='</div>';
  }
  el.innerHTML=out;
  setTimeout(()=>{const el2=document.getElementById('sd-'+today);if(el2)el2.scrollIntoView({behavior:'smooth',block:'start'});},80);
}

function staskHTML(t,proj,date,conIds){const today=td();const isSub=!!t.parentId;const isLate=t.status!=='done'&&t.status!=='hold'&&date<today;const isCon=conIds?conIds.has(t.id):false;return `<div class="stask ${t.status==='done'?'done-t':''} ${isLate?'late-t':''} ${isCon?'conflict-t':''}"><button class="stask-check ${t.status==='done'?'chk':''}" onclick="toggleDone('${proj.id}','${t.id}')">✓</button><span class="stask-time">${t.scheduledStartTime||''}${t.scheduledEndTime?'〜'+t.scheduledEndTime:''}</span><span class="stask-name">${isSub?'<span style="font-size:10px;color:var(--t3)">↳ </span>':''}${t.name}</span><span class="stask-mins">${t.estimatedMins||'?'}分</span><span style="font-size:10px;color:${proj.color||COLORS[0]};margin-left:4px">${proj.name}</span><div class="stask-acts">${t.status!=='done'?`<button class="btn btn-warn btn-xs" onclick="openResultModal('${proj.id}','${t.id}')">実績</button>`:''}<button class="btn btn-ghost btn-xs" onclick="openTimeEdit('${proj.id}','${t.id}')">✎</button></div></div>`;}
function toggleSD(id){document.getElementById(id)?.classList.toggle('open');}

// ══ CALENDAR ══
function buildCalMap(){const m={};D.projects.forEach(proj=>(proj.tasks||[]).forEach(t=>{if(!t.scheduledDate)return;if(!m[t.scheduledDate])m[t.scheduledDate]={items:[],late:false,conflict:false};m[t.scheduledDate].items.push({t,proj});if(t.scheduledDate<td()&&t.status!=='done'&&t.status!=='hold')m[t.scheduledDate].late=true;}));const _p={id:'personal',name:'個人',color:'#a78bfa',tasks:[]};(D.todayTasks||[]).forEach(t=>{if(!t.date)return;if(!m[t.date])m[t.date]={items:[],late:false,conflict:false};m[t.date].items.push({t:{...t,scheduledDate:t.date,scheduledStartTime:t.startTime,scheduledEndTime:t.endTime,parentId:null},proj:_p});});const {raw:conflicts}=getConflictIds();conflicts.forEach(c=>{if(m[c.date])m[c.date].conflict=true;});return m;}
function renderCalendar(){const calMap=buildCalMap();const first=new Date(calY,calM,1);const last=new Date(calY,calM+1,0);const today=td();document.getElementById('v-calendar').innerHTML=`<div class="ph"><div class="ph-title">カレンダー</div><div class="ph-actions"><button class="btn btn-ghost btn-sm" onclick="calMov(-1)">‹ 前月</button><button class="btn btn-ghost btn-sm" onclick="calNow()">今日</button><button class="btn btn-ghost btn-sm" onclick="calMov(1)">次月 ›</button></div></div><div style="font-size:15px;font-weight:600;margin-bottom:12px">${calY}年 ${calM+1}月</div><div class="cal-wrap"><div class="cal-grid">${JP.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${buildCalCells(calMap,first,last,today)}</div></div><div id="day-panel"></div>`;if(calSelDate)renderDayPanel(calSelDate,calMap[calSelDate]);}
function buildCalCells(calMap,first,last,today){let html='';let d=new Date(first);d.setDate(d.getDate()-d.getDay());while(d<=last||d.getDay()!==0){const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const isOther=d.getMonth()!==calM;const isToday=ds===today;const isSel=ds===calSelDate;const data=calMap[ds];const items=data?.items||[];const pills=items.slice(0,3).map(({t,proj})=>`<div class="cal-pill" style="background:${proj.color||COLORS[0]}22;color:${proj.color||COLORS[0]}">${t.scheduledStartTime?t.scheduledStartTime+' ':''}${t.name}</div>`).join('');html+=`<div class="cal-cell ${isOther?'other-month':''} ${isToday?'today':''} ${isSel?'selected':''}" onclick="calSelect('${ds}')">${data?.conflict?'<div class="cal-conflict-badge"></div>':''}<div class="cal-date">${d.getDate()}${isToday?'<span class="cal-today-dot"></span>':''}</div>${pills}${items.length>3?`<div style="font-size:9px;color:var(--t3)">+${items.length-3}件</div>`:''}</div>`;d.setDate(d.getDate()+1);if(d>last&&d.getDay()===0)break;}return html;}
function calSelect(ds){calSelDate=ds;renderCalendar();renderDayPanel(ds,buildCalMap()[ds]);}
function calMov(n){calM+=n;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCalendar();}
function calNow(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderCalendar();}
function renderDayPanel(ds,data){
  const items=(data?.items||[]).sort((a,b)=>(t2m(a.t.scheduledStartTime)||0)-(t2m(b.t.scheduledStartTime)||0));
  document.getElementById('day-panel').innerHTML=`
    <div class="day-panel">
      <div class="dp-title">
        <span>${fmtDL(ds)}</span>
        <button class="btn btn-ghost btn-xs" onclick="document.getElementById('day-panel').innerHTML='';calSelDate=null;renderCalendar()">✕</button>
      </div>
      ${items.length||((D.actualRecords||[]).filter(r=>r.date===ds).length>0)?renderTimeline(ds,items):'<div class="empty" style="padding:16px"><p>この日の予定はありません</p></div>'}
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="openTodayModal()">＋ 予定を追加</button>
        <button class="btn btn-warn btn-sm" onclick="openActualAdd('${ds}')">🟠 実績を追加（予定外）</button>
      </div>
    </div>`;
}
function renderTimeline(ds,items){
  // 設定の作業時間 ± 1時間をタイムライン範囲にする（最低6:00〜23:00）
  const wsSetting=D.settings.workStart||'06:00';
  const weSetting=D.settings.workEnd||'22:00';
  const wsH=parseInt(wsSetting.split(':')[0]);
  const weH=parseInt(weSetting.split(':')[0]);
  // 全アイテムの最早・最遅時刻も考慮
  let minH=Math.max(0, Math.min(wsH-1, 6));
  let maxH=Math.min(23, Math.max(weH+1, 22));
  items.forEach(({t,proj,isPersonal})=>{
    const isP=isPersonal||proj.id==='personal';
    const s=t2m(isP?t.startTime:t.scheduledStartTime);
    const e=t2m(isP?t.endTime:t.scheduledEndTime);
    if(s!=null){const h=Math.floor(s/60);if(h<minH)minH=Math.max(0,h-1);}
    if(e!=null){const h=Math.ceil(e/60);if(h>maxH)maxH=Math.min(24,h+1);}
  });
  (D.actualRecords||[]).filter(r=>r.date===ds).forEach(r=>{
    const s=t2m(r.startTime);const e=t2m(r.endTime);
    if(s!=null){const h=Math.floor(s/60);if(h<minH)minH=Math.max(0,h-1);}
    if(e!=null){const h=Math.ceil(e/60);if(h>maxH)maxH=Math.min(24,h+1);}
  });
  const SH=minH, EH=maxH, PPM=1.6, H=(EH-SH)*60*PPM;
  let labels='';
  for(let h=SH;h<=EH;h++){
    const top=(h-SH)*60*PPM;
    labels+=`<div class="tl-hour-line" style="top:${top}px"><span class="tl-hour-label">${h}:00</span></div>`;
  }
  const planBlocks=[],actualBlocks=[];
  items.forEach(({t,proj,isPersonal})=>{
    const isP=isPersonal||proj.id==='personal';
    const ps=isP?t2m(t.startTime):t2m(t.scheduledStartTime);
    const pe=isP?t2m(t.endTime):t2m(t.scheduledEndTime);
    const pStart=ps||SH*60;
    const pEnd=pe||(pStart+(t.estimatedMins||30));
    planBlocks.push({t,proj,s:pStart,e:pEnd,isP,col:'plan'});
    if(t.actualStartTime){
      const as=t2m(t.actualStartTime);
      const ae=t.actualEndTime?t2m(t.actualEndTime):(as+(t.actualMinsLog||t.estimatedMins||30));
      actualBlocks.push({t,proj,s:as,e:ae,isP,col:'actual'});
    }
  });
  const extraActuals=(D.actualRecords||[]).filter(r=>r.date===ds);
  extraActuals.forEach(r=>{
    const as=t2m(r.startTime),ae=t2m(r.endTime)||(as+30);
    actualBlocks.push({t:{id:r.id,name:r.name,lastNote:r.note,status:'done'},proj:{id:'extra',name:'実績',color:'#fb923c'},s:as,e:ae,isP:true,col:'actual',isExtra:true});
  });
  const {ids:conIds}=getConflictIds();
  function drawBlocks(blocks,leftPct,widthPct,isPlan){
    const lanes=[];
    blocks.forEach(b=>{
      let placed=false;
      for(let i=0;i<lanes.length;i++){
        if(lanes[i][lanes[i].length-1].e<=b.s){lanes[i].push(b);b.lane=i;placed=true;break;}
      }
      if(!placed){b.lane=lanes.length;lanes.push([b]);}
    });
    const LC=lanes.length||1;
    return blocks.map(b=>{
      const top=(b.s-SH*60)*PPM;
      const bh=Math.max(20,(b.e-b.s)*PPM);
      const w=widthPct/LC;
      const left=leftPct+b.lane*w;
      const color=b.proj.color||COLORS[0];
      const isCon=!isPlan&&conIds.has(b.t.id);
      const isDone=b.t.status==='done';
      if(isPlan){
        // 予定ブロック: クリックでアクションメニュー（実績 / 時刻変更）
        return `<div class="tl-block tl-plan ${isCon?'conflict-b':''}" style="top:${top}px;height:${bh}px;left:${left}%;width:${w-0.5}%;background:${color}18;border:1px dashed ${color}55;border-left:3px solid ${color};opacity:${isDone?0.4:0.85}" onclick="openTlMenu('${b.proj.id}','${b.t.id}',event)"><div class="tl-block-time" style="color:${color};font-size:9px">${m2t(b.s)}〜${m2t(b.e)}</div><div class="tl-block-name" style="color:var(--t2)">${b.t.name}</div><div style="font-size:9px;color:${color};margin-top:2px">⋯ タップで操作</div></div>`;
      }else{
        const bg=b.isExtra?'rgba(251,146,60,0.25)':`${color}35`;
        const borderColor=b.isExtra?'#fb923c':color;
        return `<div class="tl-block tl-actual" style="top:${top}px;height:${bh}px;left:${left}%;width:${w-0.5}%;background:${bg};border-left:4px solid ${borderColor}" onclick="${b.isExtra?`openActualEdit('${b.t.id}','${ds}')`:`openResultModal('${b.proj.id}','${b.t.id}')`}"><div class="tl-block-time" style="color:${borderColor};font-size:9px">${m2t(b.s)}〜${m2t(b.e)} ✓実績</div><div class="tl-block-name">${b.t.name}</div>${b.t.lastNote?`<div style="font-size:9px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.t.lastNote}</div>`:''}</div>`;
      }
    }).join('');
  }
  const planHTML=drawBlocks(planBlocks,1,46,true);
  const actualHTML=drawBlocks(actualBlocks,50,46,false);
  let nowLine='';
  const now=new Date();
  const todayStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  if(todayStr===ds){const nm=now.getHours()*60+now.getMinutes();if(nm>=SH*60&&nm<=EH*60)nowLine=`<div class="tl-now" style="top:${(nm-SH*60)*PPM}px"></div>`;}
  const divider=`<div style="position:absolute;left:49%;top:0;bottom:0;width:1px;background:var(--b2);"></div>`;

}

// ══ PROJECT DETAIL ══
function renderProjDetail(){const p=getProj(curProj);if(!p)return;const pct=calcProg(p);const parents=(p.tasks||[]).filter(t=>!t.parentId);const totalEst=parents.reduce((a,t)=>a+(t.estimatedMins||0),0);const totalAct=parents.reduce((a,t)=>a+(t.actualMins||0),0);const rem=Math.max(0,totalEst-totalAct);const mxd=getDailyMax(p);document.getElementById('proj-acts').innerHTML=`<button class="btn btn-ghost btn-sm" onclick="openProjModal('${p.id}')">✎ 編集</button><button class="btn btn-primary btn-sm" onclick="openTaskModal()">＋ タスク追加</button>`;document.getElementById('proj-header').innerHTML=`<div class="card" style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="width:10px;height:10px;border-radius:50%;background:${p.color||COLORS[0]};display:inline-block"></span><span style="font-size:16px;font-weight:700">${p.name}</span>${p.deadline?`<span style="font-size:12px;color:var(--t3);font-family:var(--mono)">納期: ${p.deadline}</span>`:''}</div>${p.description?`<div style="font-size:12px;color:var(--t3);margin-bottom:8px">${p.description}</div>`:''}<div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px"><span style="color:var(--t2)">進捗 ${parents.filter(t=>t.status==='done').length}/${parents.length}件完了</span><span style="font-family:var(--mono)">${pct}%</span></div><div class="pbar pbar-lg" style="margin-bottom:7px"><div class="pbar-fill" style="width:${pct}%;background:${pcColor(pct)}"></div></div><div style="display:flex;gap:12px;font-size:11px;color:var(--t3);font-family:var(--mono)"><span>残り ${rem}分</span><span>1日${mxd}分換算で約${mxd>0?Math.ceil(rem/mxd):'?'}日</span></div></div>`;switchPTab(curPTab);}
function renderProjTasks(){const p=getProj(curProj);const parents=(p.tasks||[]).filter(t=>!t.parentId);const el=document.getElementById('pt-tasks');if(!parents.length){el.innerHTML='<div class="empty"><div class="empty-icon">📝</div><p>タスクがありません</p><button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="openTaskModal()">＋ タスク追加</button></div>';return;}const grouped={todo:[],doing:[],review:[],done:[],hold:[]};parents.forEach(t=>(grouped[t.status]||grouped.todo).push(t));el.innerHTML=Object.entries(grouped).filter(([,a])=>a.length).map(([s,arr])=>`<div style="margin-bottom:14px"><div style="font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--b1)">${SL[s]} ${arr.length}</div><div class="tlist">${arr.map(t=>{const subs=(p.tasks||[]).filter(x=>x.parentId===t.id);const first=subs.length?subs.sort((a,b)=>a.scheduledDate>b.scheduledDate?1:-1)[0].scheduledDate:t.scheduledDate;const last=subs.length?subs.sort((a,b)=>a.scheduledDate>b.scheduledDate?-1:1)[0].scheduledDate:t.scheduledDate;const doneSubs=subs.filter(x=>x.status==='done').length;return `<div class="titem ${t.status==='done'?'done-item':''}"><button class="tcheck ${t.status==='done'?'chk':''}" onclick="toggleDone('${p.id}','${t.id}')">✓</button><div class="tbody"><div class="tname">${t.name}</div><div class="tmeta">${chip(t.status)}${t.estimatedMins?`<span class="tmeta-i">⏱ ${t.estimatedMins}分</span>`:''} ${subs.length>1?`<span class="tmeta-i" style="color:var(--a)">📅 ${fmtD(first)}〜${fmtD(last)} (${doneSubs}/${subs.length}完了)</span>`:first?`<span class="tmeta-i">📅 ${fmtD(first)}</span>`:''} ${t.actualMins?`<span class="tmeta-i" style="color:var(--g)">実 ${t.actualMins}分</span>`:''}</div></div><div class="tactions"><button class="btn btn-ghost btn-xs btn-icon" onclick="openTaskModal('${t.id}')">✎</button><button class="btn btn-danger btn-xs btn-icon" onclick="delTask('${p.id}','${t.id}')">🗑</button></div></div>`;}).join('')}</div></div>`).join('');}
function renderProjSched(){const p=getProj(curProj);const el=document.getElementById('pt-sched');const byDate={};(p.tasks||[]).forEach(t=>{if(!t.scheduledDate)return;if(!byDate[t.scheduledDate])byDate[t.scheduledDate]=[];byDate[t.scheduledDate].push(t);});const dates=Object.keys(byDate).sort();if(!dates.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><p>スケジュールなし</p></div><div style="text-align:center;margin-top:8px"><button class="btn btn-primary btn-sm" onclick="openTaskModal()">＋ タスク追加</button></div>`;return;}const mxd=getDailyMax(p);const today=td();const {ids:conIds}=getConflictIds();el.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap"><span style="font-size:12px;color:var(--t3)">1日上限: <strong style="color:var(--t2)">${mxd}分</strong></span><button class="btn btn-warn btn-sm" onclick="reschedProject()">⟳ リスケジュール</button></div><div class="sched-grid">${dates.map(date=>{const items=byDate[date].sort((a,b)=>(t2m(a.scheduledStartTime)||0)-(t2m(b.scheduledStartTime)||0));const tot=items.reduce((a,t)=>a+(t.estimatedMins||0),0);const isToday=date===today;const hasLate=items.some(t=>t.status!=='done'&&t.status!=='hold'&&date<today);const hasCon=items.some(t=>conIds.has(t.id));return `<div class="sched-day ${isToday?'today-row':''} ${isToday?'open':''}" id="psd-${date}"><div class="sday-head" onclick="toggleSD('psd-${date}')"><span class="sday-date ${isToday?'today-label':''}">${fmtDL(date)}</span><div class="sday-bar"><div class="pbar"><div class="pbar-fill" style="width:${Math.min(100,Math.round(tot/mxd*100))}%;background:${hasLate?'var(--r)':hasCon?'var(--o)':'var(--a)'}"></div></div></div><span class="sday-info">${tot}/${mxd}分</span><span class="sday-toggle">▶</span></div><div class="sday-tasks">${items.map(t=>{const isSub=!!t.parentId;const isLate=t.status!=='done'&&t.status!=='hold'&&date<today;const isCon=conIds.has(t.id);return `<div class="stask ${t.status==='done'?'done-t':''} ${isLate?'late-t':''} ${isCon?'conflict-t':''}"><button class="stask-check ${t.status==='done'?'chk':''}" onclick="toggleDone('${p.id}','${t.id}')">✓</button><span class="stask-time">${t.scheduledStartTime||''}${t.scheduledEndTime?'〜'+t.scheduledEndTime:''}</span><span class="stask-name">${isSub?'<span style="font-size:10px;color:var(--t3)">↳ </span>':''}${t.name}</span><span class="stask-mins">${t.estimatedMins||'?'}分</span><div class="stask-acts">${t.status!=='done'?`<button class="btn btn-warn btn-xs" onclick="openResultModal('${p.id}','${t.id}')">実績</button>`:''}<button class="btn btn-ghost btn-xs" onclick="openTimeEdit('${p.id}','${t.id}')">✎</button></div></div>`;}).join('')}</div></div>`;}).join('')}</div>`;}
function renderProjLog(){const p=getProj(curProj);const el=document.getElementById('pt-log');const done=(p.tasks||[]).filter(t=>t.status==='done'&&t.achievementPct!=null).sort((a,b)=>b.scheduledDate>a.scheduledDate?1:-1);if(!done.length){el.innerHTML='<div class="empty"><div class="empty-icon">📊</div><p>完了タスクなし</p></div>';return;}const byDate={};done.forEach(t=>{if(!byDate[t.scheduledDate])byDate[t.scheduledDate]=[];byDate[t.scheduledDate].push(t);});el.innerHTML='<div class="sched-grid">'+Object.keys(byDate).sort().reverse().map(date=>`<div class="card" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><span style="font-family:var(--mono)">${fmtDL(date)}</span><span style="color:var(--g)">${byDate[date].reduce((a,t)=>a+(t.actualMins||0),0)}分完了</span></div>${byDate[date].map(t=>`<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between"><span>${t.name}</span><span style="color:var(--t3);font-family:var(--mono)">${t.achievementPct||0}%${t.actualMinsLog!=null?' 実働'+t.actualMinsLog+'分':''}</span></div>`).join('')}</div>`).join('')+'</div>';}

function saveGhToken(){const input=document.getElementById('cfg-token').value.trim();if(!input||input.startsWith('●'))return;ghSetToken(input);renderSettings();setSS('saving','読み込み中…');ghLoad().then(ok=>{if(ok){renderAll();gotoView('dash');}});}
function clearGhToken(){if(!confirm('トークンを削除します。'))return;ghSetToken('');renderSettings();setSS('notoken','トークン未設定');}
async function testGhConnection(){const token=ghToken();if(!token){document.getElementById('gh-test-result').textContent='⚠ トークン未設定';return;}document.getElementById('gh-test-result').textContent='接続中…';try{const res=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}});document.getElementById('gh-test-result').innerHTML=res.ok?'<span style="color:var(--g)">✓ 接続成功！</span>':`<span style="color:var(--r)">✕ HTTP ${res.status}</span>`;}catch(e){document.getElementById('gh-test-result').innerHTML=`<span style="color:var(--r)">✕ ${e.message}</span>`;}}
function saveSettings(){const checked=[...document.querySelectorAll('#v-settings input[type=checkbox]:checked')].map(e=>parseInt(e.value));D.settings={workStart:document.getElementById('cfg-ws').value||'09:00',workEnd:document.getElementById('cfg-we').value||'18:00',maxMins:parseInt(document.getElementById('cfg-max').value)||240,buffer:parseInt(document.getElementById('cfg-buf').value)||20,workdays:checked.length?checked:[1,2,3,4,5]};save();}
function forceReschedAll(){D.projects.forEach(p=>buildSchedule(p,td()));save();renderAll();}
function exportData(){const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(D,null,2));a.download='taskflow_backup_'+td()+'.json';a.click();}
function importData(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const r=new FileReader();r.onload=ev=>{try{D=JSON.parse(ev.target.result);save();renderAll();}catch(e){alert('読み込みに失敗しました');}};r.readAsText(e.target.files[0]);};i.click();}
function resetAll(){if(!confirm('全データを削除します。よろしいですか？'))return;D={projects:[],todayTasks:[],settings:{maxMins:240,buffer:20,workStart:'09:00',workEnd:'18:00',workdays:[1,2,3,4,5]}};save();renderAll();}

function saveProj(){const name=document.getElementById('pf-name').value.trim();if(!name){alert('プロジェクト名を入力してください');return;}const editId=document.getElementById('pf-id').value;const data={name,startDate:document.getElementById('pf-start').value,deadline:document.getElementById('pf-deadline').value,dailyMins:document.getElementById('pf-daily').value||null,includeWeekends:document.getElementById('pf-wkend').value==='1',description:document.getElementById('pf-desc').value,color:pickedColor,status:document.getElementById('pf-status').value||'active'};if(editId){const p=getProj(editId);if(p)Object.assign(p,data);}else D.projects.push({id:uid(),tasks:[],...data});save();closeM('m-proj');renderCurrent();}

function onAutoChange(){const m=document.getElementById('tf-auto').value;document.getElementById('tf-manual-row').classList.toggle('hidden',m!=='manual');}
function openTaskModal(editId){const p=getProj(curProj);if(!p)return;const t=editId?(p.tasks||[]).find(x=>x.id===editId&&!x.parentId):null;document.getElementById('m-task-title').textContent=t?'タスク編集':'タスク追加';document.getElementById('tf-id').value=t?.id||'';document.getElementById('tf-proj-id').value=p.id;document.getElementById('tf-name').value=t?.name||'';document.getElementById('tf-status').value=t?.status||'todo';document.getElementById('tf-est').value=t?.estimatedMins||'';document.getElementById('tf-start').value=t?.taskStartDate||'';document.getElementById('tf-pref-time').value=t?.prefTime||'';document.getElementById('tf-notes').value=t?.notes||'';document.getElementById('tf-mdate').value=t?.scheduledDate||'';document.getElementById('tf-mtime').value=t?.scheduledStartTime||'';const mode=t?.autoSchedule===false?(t?.scheduledDate?'manual':'off'):'auto';document.getElementById('tf-auto').value=mode;onAutoChange();openM('m-task');}
function saveTask(){const name=document.getElementById('tf-name').value.trim();if(!name){alert('タスク名を入力してください');return;}const projId=document.getElementById('tf-proj-id')?.value||curProj;const p=getProj(projId);if(!p)return;const editId=document.getElementById('tf-id').value;const mode=document.getElementById('tf-auto').value;const estRaw=document.getElementById('tf-est').value.replace(/[^0-9]/g,'');const est=estRaw?parseInt(estRaw,10):null;const mtime=document.getElementById('tf-mtime').value;const mdate=document.getElementById('tf-mdate').value;const tdata={name,status:document.getElementById('tf-status').value,estimatedMins:est,taskStartDate:document.getElementById('tf-start').value||null,prefTime:document.getElementById('tf-pref-time').value||null,notes:document.getElementById('tf-notes').value,autoSchedule:mode==='auto'||mode==='manual'?true:false,scheduledDate:mode==='manual'?(mdate||null):null,scheduledStartTime:mode==='manual'?(mtime||null):null,scheduledEndTime:mode==='manual'&&mtime&&est?addMinsT(mtime,est):null,actualMins:null};if(editId){const t=p.tasks.find(x=>x.id===editId&&!x.parentId);if(t)Object.assign(t,tdata);}else p.tasks.push({id:uid(),createdAt:td(),parentId:null,...tdata});save();closeM('m-task');renderCurrent('sched');if(mode==='auto'){setTimeout(()=>{buildSchedule(p,td());renderCurrent('sched');},50);}}
function delTask(projId,taskId){if(!confirm('削除しますか？（サブタスクも削除）'))return;const p=getProj(projId);if(!p)return;p.tasks=p.tasks.filter(x=>x.id!==taskId&&x.parentId!==taskId);save();renderCurrent();}

// ══ CONFLICT UI ══
function showConflictModal(conflicts){document.getElementById('conflict-body').innerHTML=conflicts.slice(0,6).map(c=>`<div style="background:var(--s3);border:1px solid rgba(251,146,60,.3);border-radius:8px;padding:10px 12px;margin-bottom:8px"><div style="font-size:12.5px;color:var(--o);font-weight:600;margin-bottom:4px">⚠ ${c.a.task.name} ↔ ${c.b.task.name}</div><div style="font-size:11px;color:var(--t2);font-family:var(--mono);margin-bottom:8px">${c.date} ${m2t(c.a.s)}〜${m2t(c.a.e)} / ${m2t(c.b.s)}〜${m2t(c.b.e)}</div><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:11px;color:var(--t2);min-width:160px">「${c.a.task.name}」開始:</span><input type="time" class="fi" style="width:110px;padding:3px 6px;font-size:12px" id="cf-${c.a.task.id}" value="${c.a.task.scheduledStartTime||''}"></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--t2);min-width:160px">「${c.b.task.name}」開始:</span><input type="time" class="fi" style="width:110px;padding:3px 6px;font-size:12px" id="cf-${c.b.task.id}" value="${c.b.task.scheduledStartTime||''}"></div></div>`).join('');pendingConflict=conflicts;openM('m-conflict');}
function applyConflictFix(){if(!pendingConflict)return;pendingConflict.forEach(c=>{const fixA=document.getElementById(`cf-${c.a.task.id}`)?.value;const fixB=document.getElementById(`cf-${c.b.task.id}`)?.value;if(fixA){c.a.task.scheduledStartTime=fixA;c.a.task.scheduledEndTime=addMinsT(fixA,c.a.task.estimatedMins||30);}if(fixB){c.b.task.scheduledStartTime=fixB;c.b.task.scheduledEndTime=addMinsT(fixB,c.b.task.estimatedMins||30);}});pendingConflict=null;save();closeM('m-conflict');renderCurrent();}
function saveWithConflicts(){pendingConflict=null;save();closeM('m-conflict');renderCurrent();}
function showAllConflicts(){const c=checkAllConflicts();if(c.length)showConflictModal(c);}

// ══ TIME EDIT ══
function updateTeEndHint(){
  const start=document.getElementById('te-start')?.value||'';
  const mins=parseInt(document.getElementById('te-mins')?.value)||0;
  const hint=document.getElementById('te-end-hint');
  if(hint&&start&&mins>0){
    const endTime=addMinsT(start,mins);
    hint.textContent='→ 終了: '+endTime;
    const endEl=document.getElementById('te-end');
    if(endEl)endEl.value=endTime;
  }else if(hint)hint.textContent='';
}
function updateTeEndFromEnd(){
  const start=document.getElementById('te-start')?.value||'';
  const end=document.getElementById('te-end')?.value||'';
  const hint=document.getElementById('te-end-hint');
  if(start&&end){
    const sm=t2m(start),em=t2m(end);
    if(em>sm){
      const mins=em-sm;
      const minsEl=document.getElementById('te-mins');
      if(minsEl)minsEl.value=mins;
      if(hint)hint.textContent='→ 作業時間: '+mins+'分';
    }
  }
}
function openTimeEdit(projId,taskId){const isP=projId==='personal';const proj=isP?null:getProj(projId);const t=isP?(D.todayTasks||[]).find(x=>x.id===taskId):(proj?.tasks||[]).find(x=>x.id===taskId);if(!t)return;
  document.getElementById('te-proj-id').value=projId;
  document.getElementById('te-task-id').value=taskId;
  document.getElementById('te-info').textContent=t.name;
  // 日付
  document.getElementById('te-date').value=(isP?t.date:t.scheduledDate)||td();
  // 開始・終了時刻: 既存値をそのままセット（空なら空文字のまま）
  const curStart=(isP?t.startTime:t.scheduledStartTime)||'';
  const curEnd=(isP?t.endTime:t.scheduledEndTime)||'';
  const curMins=t.estimatedMins||'';
  document.getElementById('te-start').value=curStart;
  document.getElementById('te-end').value=curEnd;
  document.getElementById('te-mins').value=curMins;
  // ヒント: 既存の時刻を表示してわかりやすく
  const hint=document.getElementById('te-end-hint');
  if(curStart&&curEnd){hint.textContent='現在: '+curStart+'〜'+curEnd+(curMins?' ('+curMins+'分)':'');}
  else if(curStart){hint.textContent='現在の開始: '+curStart+(curMins?' ('+curMins+'分)':'');}
  else{hint.textContent='';}
  openM('m-time-edit');}
function saveTimeEdit(){
  const projId=document.getElementById('te-proj-id').value;
  const taskId=document.getElementById('te-task-id').value;
  const isP=projId==='personal';
  const proj=isP?null:getProj(projId);
  const t=isP?(D.todayTasks||[]).find(x=>x.id===taskId):(proj?.tasks||[]).find(x=>x.id===taskId);
  if(!t)return;
  const newDate=document.getElementById('te-date').value;
  const newStart=document.getElementById('te-start').value;
  const newEndDirect=document.getElementById('te-end')?.value||'';
  const nm=parseInt(document.getElementById('te-mins')?.value)||0;
  let newEnd='';
  if(newEndDirect)newEnd=newEndDirect;
  else if(nm>0&&newStart)newEnd=addMinsT(newStart,nm);
  if(nm>0)t.estimatedMins=nm;
  else if(newStart&&newEnd)t.estimatedMins=Math.max(1,t2m(newEnd)-t2m(newStart));
  if(isP){t.date=newDate;t.startTime=newStart;t.endTime=newEnd;}
  else{t.scheduledDate=newDate;t.scheduledStartTime=newStart;t.scheduledEndTime=newEnd;t.pinned=true;}
  save();closeM('m-time-edit');renderCurrent();
  const c=checkAllConflicts();if(c.length)showConflictModal(c);
}

// ══ RESULT ══
function openResultModal(projId,taskId){
  resultCtx={projId,taskId};
