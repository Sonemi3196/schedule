  document.getElementById('rf-pct').value=t.achievementPct||'';
  document.getElementById('rf-actual').value=t.actualMinsLog||'';
  // 実績時刻: 記録済みならその値、なければ予定時刻をデフォルトに
  const defActualStart=t.actualStartTime||(isP?t.startTime:t.scheduledStartTime)||'';
  const defActualEnd=t.actualEndTime||(isP?t.endTime:t.scheduledEndTime)||'';
  document.getElementById('rf-actual-start').value=defActualStart;
  document.getElementById('rf-actual-end').value=defActualEnd;
  document.getElementById('rf-status').value=t.status||'doing';
  document.getElementById('rf-note').value=t.lastNote||'';
  document.getElementById('rf-pct-hint').textContent='';
  document.getElementById('rf-preview').innerHTML='';
  openM('m-result');
}
function onPctInput(){const pct=parseInt(document.getElementById('rf-pct').value)||0;const tid=document.getElementById('rf-task-id').value;const proj=getProj(document.getElementById('rf-proj-id').value);const t=(proj?.tasks||[]).find(x=>x.id===tid);if(!t)return;const actual=Math.round((t.estimatedMins||0)*pct/100);const rem=Math.max(0,(t.estimatedMins||0)-actual);document.getElementById('rf-pct-hint').textContent='消化 '+actual+'分 / 残り '+rem+'分 ('+pct+'%)';}
function saveResult(){
  const pct=parseInt(document.getElementById('rf-pct').value);
  const status=document.getElementById('rf-status').value;
  const note=document.getElementById('rf-note').value;
  const projId=document.getElementById('rf-proj-id').value;
  const taskId=document.getElementById('rf-task-id').value;
  const isP=projId==='personal';
  const proj=isP?null:getProj(projId);
  const t=isP?(D.todayTasks||[]).find(x=>x.id===taskId):(proj?.tasks||[]).find(x=>x.id===taskId);
  if(!t){closeM('m-result');return;}
  const actualLog=parseInt(document.getElementById('rf-actual')?.value)||null;
  t.achievementPct=isNaN(pct)?null:Math.max(0,pct);
  t.actualMins=isNaN(pct)?null:Math.round((t.estimatedMins||0)*pct/100);
  if(actualLog!==null)t.actualMinsLog=actualLog;
  const actualStart=document.getElementById('rf-actual-start')?.value||null;
  const actualEnd=document.getElementById('rf-actual-end')?.value||null;
  if(actualStart)t.actualStartTime=actualStart;
  if(actualEnd)t.actualEndTime=actualEnd;
  t.status=status;
  t.lastNote=note;
  if(status==='done'){
    if(isNaN(pct)||pct<=0)t.achievementPct=100;
    t.actualMins=Math.round((t.estimatedMins||0)*(t.achievementPct||100)/100);
    if(!isP&&t.parentId){const sibs=(proj.tasks||[]).filter(x=>x.parentId===t.parentId);const par=(proj.tasks||[]).find(x=>x.id===t.parentId);if(par){par.actualMins=sibs.reduce((a,s)=>a+(s.actualMins||0),0);if(sibs.every(s=>s.status==='done'||s.id===t.id))par.status='done';}}
    if(!isP&&!t.parentId)(proj.tasks||[]).filter(x=>x.parentId===t.id).forEach(s=>{s.status='done';s.achievementPct=100;s.actualMins=s.estimatedMins;});
    save();closeM('m-result');renderCurrent();
  }else{
    if(!isP&&t.parentId){const par=(proj.tasks||[]).find(x=>x.id===t.parentId);if(par){const ds=(proj.tasks||[]).filter(x=>x.parentId===t.parentId&&x.status==='done'&&x.id!==t.id);par.actualMins=ds.reduce((a,s)=>a+(s.actualMins||s.estimatedMins||0),0)+(t.actualMins||0);}}
    if(!isP)buildSchedule(proj,td());
    const rem=Math.max(0,(t.estimatedMins||0)-(t.actualMins||0));
    document.getElementById('rf-preview').innerHTML=`<div style="margin-top:10px;padding:10px;background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.2);border-radius:7px;font-size:12px;color:var(--a)">✓ 実績を保存しました${!isP?' (残り '+rem+'分で再スケジュール)':''}</div>`;
    save();renderCurrent();
  }
}

// ══ TOGGLE DONE ══
function toggleDone(projId,taskId){if(projId==='personal'){const t=(D.todayTasks||[]).find(x=>x.id===taskId);if(!t)return;t.status=t.status==='done'?'todo':'done';save();renderCurrent();return;}const proj=getProj(projId);if(!proj)return;const t=proj.tasks.find(x=>x.id===taskId);if(!t)return;if(t.status==='done'){t.status='todo';t.achievementPct=null;t.actualMins=null;if(t.parentId){const par=proj.tasks.find(x=>x.id===t.parentId);if(par&&par.status==='done')par.status='doing';}}else{t.status='done';t.achievementPct=100;t.actualMins=t.estimatedMins;if(t.parentId){const sibs=proj.tasks.filter(x=>x.parentId===t.parentId);const par=proj.tasks.find(x=>x.id===t.parentId);if(par){par.actualMins=sibs.reduce((a,s)=>a+(s.actualMins||0),0);if(sibs.every(s=>s.status==='done'||s.id===t.id))par.status='done';}}if(!t.parentId)proj.tasks.filter(x=>x.parentId===t.id).forEach(s=>{s.status='done';s.achievementPct=100;s.actualMins=s.estimatedMins;});}save();renderCurrent();}

// ══ RESCHED ══
function reschedProject(){const p=getProj(curProj);if(!p)return;const copy=JSON.parse(JSON.stringify(p));buildSchedule(copy,td());const items=copy.tasks.filter(t=>t.scheduledDate);const byDate={};items.forEach(t=>{if(!byDate[t.scheduledDate])byDate[t.scheduledDate]=[];byDate[t.scheduledDate].push(t);});const dates=Object.keys(byDate).sort();const last=dates[dates.length-1];document.getElementById('rs-info').textContent=`対象: ${p.name}`;const w=document.getElementById('rs-warn');if(p.deadline&&last&&last>p.deadline){w.textContent=`⚠ 納期 (${p.deadline}) を超えます。最終日: ${last}`;w.style.display='block';}else w.style.display='none';document.getElementById('rs-preview').innerHTML='<div class="sched-grid">'+dates.slice(0,14).map(d=>`<div style="padding:5px 10px;background:var(--s3);border-radius:7px;font-size:12px;display:flex;justify-content:space-between"><span style="font-family:var(--mono)">${fmtDL(d)}</span><span style="color:var(--t2)">${byDate[d].length}件 ${byDate[d].reduce((a,t)=>a+(t.estimatedMins||0),0)}分</span></div>`).join('')+(dates.length>14?`<div style="font-size:11px;color:var(--t3);padding:4px 10px">+${dates.length-14}日</div>`:'')+`</div>`;pendingRS={mode:'project',projId:p.id};openM('m-resched');}
function reschedAll(){document.getElementById('rs-info').textContent='全プロジェクトをリスケジュールします';document.getElementById('rs-warn').style.display='none';document.getElementById('rs-preview').innerHTML='<div style="color:var(--t3);font-size:12px">確認後に全プロジェクトのサブタスクを再生成します</div>';pendingRS={mode:'all'};openM('m-resched');}
function applyResched(){if(!pendingRS)return;if(pendingRS.mode==='all')D.projects.forEach(p=>buildSchedule(p,td()));else{const p=getProj(pendingRS.projId);if(p)buildSchedule(p,td());}pendingRS=null;save();closeM('m-resched');renderCurrent();}

// ══ TODAY TASKS ══
function onRepeatChange(){const v=document.getElementById('ttf-repeat').value;document.getElementById('ttf-repeat-days').classList.toggle('hidden',v!=='weekly');document.getElementById('ttf-repeat-end').classList.toggle('hidden',v==='none');}
function openTodayModal(editId){
  window._editTodayId=editId||null;
  const t=editId?(D.todayTasks||[]).find(x=>x.id===editId):null;
  document.getElementById('m-today-title').textContent=t?'個人タスク編集':'個人タスク追加';
  document.getElementById('ttf-save-btn').textContent=t?'保存':'追加';
  window._editGroupMode='single';
  // 繰り返しグループの場合、編集範囲を選べるバナーを表示
  const groupBanner=document.getElementById('ttf-group-banner');
  if(t&&t.repeatGroupId){
    const grpCount=(D.todayTasks||[]).filter(x=>x.repeatGroupId===t.repeatGroupId).length;
    const futureCount=(D.todayTasks||[]).filter(x=>x.repeatGroupId===t.repeatGroupId&&x.date>=t.date).length;
    groupBanner.style.display='block';
    groupBanner.innerHTML='';
    const hdr=document.createElement('div');
    hdr.style.cssText='font-size:11px;color:var(--y);margin-bottom:6px';
    hdr.textContent='\uD83D\uDD01 繰り返しタスクです（グループ '+grpCount+' 件）';
    groupBanner.appendChild(hdr);
    const btnRow=document.createElement('div');
    btnRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap';
    [['この1件のみ','single'],['今日以降('+futureCount+'件)','future'],['全件('+grpCount+'件)','all']].forEach(([label,mode],idx)=>{
      const btn=document.createElement('button');
      btn.type='button';
      btn.textContent=label;
      btn.style.cssText='padding:3px 8px;border-radius:5px;border:1px solid var(--b2);font-size:11px;cursor:pointer;transition:all .15s';
      if(idx===0){btn.style.background='var(--a)';btn.style.color='#0a0c10';}
      btn.addEventListener('click',function(){
        window._editGroupMode=mode;
        btnRow.querySelectorAll('button').forEach(b=>{b.style.background='';b.style.color='';});
        this.style.background='var(--a)';this.style.color='#0a0c10';
      });
      btnRow.appendChild(btn);
    });
    groupBanner.appendChild(btnRow);
  } else {
    groupBanner.style.display='none';
    groupBanner.innerHTML='';
  }
  document.getElementById('ttf-name').value=t?t.name:'';
  document.getElementById('ttf-date').value=t?t.date:(calSelDate||td());
  document.getElementById('ttf-start').value=t?(t.startTime||''):'';
  document.getElementById('ttf-end').value=t?(t.endTime||''):'';
  document.getElementById('ttf-est').value=t?(t.estimatedMins||''):'';
  document.getElementById('ttf-plan').value=t?(t.plan||''):'';
  // 繰り返しは新規のみ（編集時はリセット）
  document.getElementById('ttf-repeat').value='none';
  document.getElementById('ttf-end-date').value='';
  document.querySelectorAll('.ttf-wd').forEach(cb=>{cb.checked=[1,2,3,4,5].includes(parseInt(cb.value));});
  onRepeatChange();
  document.getElementById('ttf-proj').innerHTML='<option value="">なし</option>'+D.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  openM('m-today');
}
function saveTodayTask(){if(window._savingToday)return;window._savingToday=true;setTimeout(()=>{window._savingToday=false;},1000);const name=document.getElementById('ttf-name').value.trim();if(!name){window._savingToday=false;return;}if(!D.todayTasks)D.todayTasks=[];const ttDate=document.getElementById('ttf-date').value||td();const ttStart=document.getElementById('ttf-start').value||null;const ttEst=parseInt(document.getElementById('ttf-est').value)||null;const ttEnd=document.getElementById('ttf-end').value||(ttStart&&ttEst?addMinsT(ttStart,ttEst):null);const ttPlan=document.getElementById('ttf-plan').value;const ttRepeat=document.getElementById('ttf-repeat').value||'none';const ttRepeatEnd=document.getElementById('ttf-end-date').value||null;if(!ttRepeat||ttRepeat==='none'){
    if(window._editTodayId){
      // 編集: 既存タスクを上書き
      const idx=(D.todayTasks||[]).findIndex(x=>x.id===window._editTodayId);
      if(idx>=0){
        const orig=D.todayTasks[idx];
        const updated={...orig,name,estimatedMins:ttEst,startTime:ttStart,endTime:ttEnd,plan:ttPlan};
        if(window._editGroupMode==='all'&&orig.repeatGroupId){
          // グループ全体を更新（時刻・メモのみ、日付は各自維持）
          D.todayTasks=D.todayTasks.map(x=>x.repeatGroupId===orig.repeatGroupId?{...x,name,estimatedMins:ttEst,startTime:ttStart,endTime:ttEnd,plan:ttPlan}:x);
        } else if(window._editGroupMode==='future'&&orig.repeatGroupId){
          // 今日以降を更新
          D.todayTasks=D.todayTasks.map(x=>(x.repeatGroupId===orig.repeatGroupId&&x.date>=orig.date)?{...x,name,estimatedMins:ttEst,startTime:ttStart,endTime:ttEnd,plan:ttPlan}:x);
        } else {
          D.todayTasks[idx]={...updated,date:ttDate};
        }
      }
    } else {
      D.todayTasks.push({id:uid(),date:ttDate,name,estimatedMins:ttEst,startTime:ttStart,endTime:ttEnd,plan:ttPlan,status:'todo',repeatGroupId:null});
    }
    save();closeM('m-today');renderToday();if(curView==='calendar')renderCalendar();return;
  }const ttRepeatDays=ttRepeat==='weekly'?[...document.querySelectorAll('.ttf-wd:checked')].map(cb=>parseInt(cb.value)):null;
  if(!ttRepeatEnd){alert('繰り返し終了日を入力してください');window._savingToday=false;return;}
  const gid=uid();const endD=new Date(ttRepeatEnd+'T00:00:00');let cur=new Date(ttDate+'T00:00:00');while(cur<=endD){const ds=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');const day=cur.getDay();let include=false;if(ttRepeat==='daily')include=true;else if(ttRepeat==='weekdays')include=[1,2,3,4,5].includes(day);else if(ttRepeat==='weekly')include=ttRepeatDays&&ttRepeatDays.includes(day);else if(ttRepeat==='monthly')include=cur.getDate()===new Date(ttDate+'T00:00:00').getDate();if(include)D.todayTasks.push({id:uid(),date:ds,name,estimatedMins:ttEst,startTime:ttStart,endTime:ttEnd,plan:ttPlan,status:'todo',repeatGroupId:gid,repeat:ttRepeat});cur.setDate(cur.getDate()+1);}save();closeM('m-today');renderToday();if(curView==='calendar')renderCalendar();}
function toggleTodayTask(id){const t=(D.todayTasks||[]).find(x=>x.id===id);if(!t)return;t.status=t.status==='done'?'todo':'done';save();renderToday();}
function delTodayTask(id){const t=(D.todayTasks||[]).find(x=>x.id===id);if(!t)return;if(t.repeatGroupId){const choice=confirm('繰り返しタスクです。\nOK=この日以降を全て削除\nキャンセル=この1件だけ削除');D.todayTasks=choice?D.todayTasks.filter(x=>!(x.repeatGroupId===t.repeatGroupId&&x.date>=t.date)):D.todayTasks.filter(x=>x.id!==id);}else{if(!confirm('削除しますか？'))return;D.todayTasks=D.todayTasks.filter(x=>x.id!==id);}save();renderToday();if(curView==='calendar')renderCalendar();}

// ══ ACTUAL RECORDS ══
function openActualAdd(ds){document.getElementById('aa-date').value=ds;document.getElementById('aa-name').value='';document.getElementById('aa-start').value='';document.getElementById('aa-end').value='';document.getElementById('aa-note').value='';window._editActualId=null;openM('m-actual-add');}
function openActualEdit(id,ds){const r=(D.actualRecords||[]).find(x=>x.id===id);if(!r)return;document.getElementById('aa-date').value=r.date||ds;document.getElementById('aa-name').value=r.name||'';document.getElementById('aa-start').value=r.startTime||'';document.getElementById('aa-end').value=r.endTime||'';document.getElementById('aa-note').value=r.note||'';window._editActualId=id;openM('m-actual-add');}
function saveActualAdd(){
  const name=document.getElementById('aa-name').value.trim();
  if(!name){alert('内容を入力してください');return;}
  const ds=document.getElementById('aa-date').value;
  const rec={id:window._editActualId||uid(),date:ds,name,startTime:document.getElementById('aa-start').value||null,endTime:document.getElementById('aa-end').value||null,note:document.getElementById('aa-note').value,type:'actual'};
  if(!D.actualRecords)D.actualRecords=[];
  if(window._editActualId){const idx=D.actualRecords.findIndex(x=>x.id===window._editActualId);if(idx>=0)D.actualRecords[idx]=rec;}
  else D.actualRecords.push(rec);
  window._editActualId=null;
  save();closeM('m-actual-add');
  const calMap=buildCalMap();renderDayPanel(ds,calMap[ds]);
}
// タイムラインの予定ブロックメニュー
function openTlMenu(projId,taskId,ev){
  ev.stopPropagation();
  // 既存のメニューを消す
  const old=document.getElementById('tl-menu');if(old)old.remove();
  const isP=projId==='personal';
  const proj=isP?null:getProj(projId);
  const t=isP?(D.todayTasks||[]).find(x=>x.id===taskId):(proj?.tasks||[]).find(x=>x.id===taskId);
  if(!t)return;
  const menu=document.createElement('div');
  menu.id='tl-menu';
  menu.style.cssText='position:fixed;z-index:600;background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.4);min-width:160px';
  menu.style.left=Math.min(ev.clientX,window.innerWidth-180)+'px';
  menu.style.top=Math.min(ev.clientY,window.innerHeight-120)+'px';
  // タイトル
  const mTitle=document.createElement('div');
  mTitle.style.cssText='font-size:11px;color:var(--t3);padding:4px 8px;margin-bottom:4px;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px';
  mTitle.textContent=t.name;
  menu.appendChild(mTitle);
  // ボタン生成ヘルパー
  function mkBtn(label,fn){
    const b=document.createElement('button');
    b.textContent=label;
    b.style.cssText='display:block;width:100%;text-align:left;padding:7px 10px;border:none;background:none;color:var(--text);font-size:13px;border-radius:6px;cursor:pointer';
    b.addEventListener('mouseenter',()=>b.style.background='var(--s3)');
    b.addEventListener('mouseleave',()=>b.style.background='');
    b.addEventListener('click',()=>{menu.remove();fn();});
    menu.appendChild(b);
  }
  mkBtn('📝 実績を記録',()=>openResultModal(projId,taskId));
  mkBtn('⏱ 時刻を変更',()=>openTimeEdit(projId,taskId));
  if(isP) mkBtn('✎ タスクを編集',()=>openTodayModal(taskId));
  document.body.appendChild(menu);
  // 外クリックで閉じる
  setTimeout(()=>document.addEventListener('click',function h(){document.getElementById('tl-menu')?.remove();document.removeEventListener('click',h);},{once:true}),10);
}
function delActual(id,ds){if(!confirm('削除しますか？'))return;D.actualRecords=(D.actualRecords||[]).filter(x=>x.id!==id);save();const calMap=buildCalMap();renderDayPanel(ds,calMap[ds]);}

// ══ THEME ══
function applyTheme(id){localStorage.setItem('tf_theme',id);document.documentElement.setAttribute('data-theme',id==='dark'?'':id);if(curView==='settings')renderSettings();}
function initTheme(){const t=localStorage.getItem('tf_theme')||'dark';document.documentElement.setAttribute('data-theme',t==='dark'?'':t);}

(async function(){
  initTheme();
  const now=new Date();calY=now.getFullYear();calM=now.getMonth();
  renderSidebar();
  if(ghToken()){
    const ok=await ghLoad();
    renderAll();gotoView('dash');
  }else{
    setSS('notoken','⚙設定でトークンを入力');
    renderAll();gotoView('settings');
  }
})();
</script>
